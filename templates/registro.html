<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climapp - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registro_styles.css') }}">
</head>
<body>

    <div class="page-container">
        <h1>Registrar Datos</h1> 
        
        <div class="card">
            <form id="form-registro">
                <div class="form-group">
                    <label>ID de la estación</label>
                    <input type="text" id="estacion_id" name="estacion_id" placeholder="Ej: EST-01" required>
                </div>

                <div class="form-group">
                    <label>Fecha y Hora</label>
                    <input type="text" id="fecha" name="fecha" placeholder="DD-MM-AAAA HH:MM" required>
                </div>

                <div class="grid-inputs">
                    <div class="form-group">
                        <label>Temperatura (ºC)</label>
                        <input type="number" step="0.1" id="temperatura" name="temperatura" placeholder="0.0" required>
                    </div>

                    <div class="form-group">
                        <label>Humedad (%)</label>
                        <input type="number" id="humedad" name="humedad" min="0" max="100" placeholder="0" required>
                    </div>
                </div>

                <div class="grid-inputs">
                    <div class="form-group">
                        <label>Viento (Km/H)</label>
                        <input type="number" step="0.1" id="viento" name="viento" min="0" placeholder="0" required>
                    </div>

                    <div class="form-group">
                        <label>Lluvia (mm)</label>
                        <input type="number" step="0.1" id="lluvia" name="lluvia" min="0" placeholder="0" required>
                    </div>
                </div>

                <button type="submit" class="primary-btn">
                    Guardar Registro
                </button>
            </form>
            
            <div id="mensaje" class="message"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
