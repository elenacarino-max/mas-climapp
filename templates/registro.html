<!DOCTYPE html>
<html lang = "es">
<head>
    <meta charset="UTF-8">
    <title>Climapp - Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body style = "background-color: #f8fafc; padding: 16px;">
    <h1 style="color: #1e293b; font-size: 24px; font-weight: 600;">
    Registrar Datos</h1> <form id="form-registro" class="card" 
    style="border-radius: 8px; border: 1px solid #cbd5e1; padding: 16px;
    background: white;">

        <div style="margin-bottom: 16px;">
            <label style="display: block; font-size: 14px; color: #64748b;">
            Temperatura</label>
            <input type="number" id="temperatura" style="border: 1px solid #cbd5e1;
            border-radius: 8px; width: 100%;">
        </div>

        <button type="submit" style="background-color: #2563eb; color: white;
        border-radius: 8px; padding: 10px 20px; border: none; font-weight: 600;
        cursor: pointer;">
            Guardar Registro
        </button>

    </form>

    <div id="mensje" style="margin-top: 16px; font-weight: 500;"></div>

    <script src="../static/js/app.js"></script>

</body>
</html>
